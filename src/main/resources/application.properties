spring.application.name=attendance

# =====================
# Server
# =====================
server.port=8080

# =====================
# Database
# =====================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/yanus}
spring.datasource.username=${DB_USERNAME:yanus}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# =====================
# JPA
# =====================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =====================
# Flyway
# =====================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# =====================
# JWT
# =====================
jwt.secret=${JWT_SECRET}
jwt.access-expiration=${JWT_ACCESS_EXPIRATION:3600000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# =====================
# Actuator
# =====================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# =====================
# Logging
# =====================
logging.level.com.yanus.attendance=DEBUG
logging.level.org.springframework.security=INFO
