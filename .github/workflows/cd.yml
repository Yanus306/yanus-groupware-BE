name: CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 실행 권한 부여
        run: chmod +x gradlew

      - name: 테스트 실행
        run: ./gradlew test
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: bootJar 빌드
        run: ./gradlew clean bootJar
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: 서버로 JAR 업로드
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "build/libs/attendance-0.0.1-SNAPSHOT.jar"
          target: "/home/yanus/app/"

      - name: 서버에서 배포 반영
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            cp /home/yanus/app/attendance-0.0.1-SNAPSHOT.jar /home/yanus/app/app.jar
            chown yanus:yanus /home/yanus/app/app.jar
            sudo systemctl restart yanus
            sudo systemctl status yanus --no-pager